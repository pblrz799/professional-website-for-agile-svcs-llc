<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" role="img" aria-label="Agile Services, LLC">
  <title>Agile Services, LLC</title>

  <!-- ============================================
       ISOTIPO en versión white (para fondos oscuros)
       ============================================ -->

  <!-- Cuadrante superior izquierdo: white sólido -->
  <path d="M 20 12
           Q 12 12 12 20
           L 12 60
           L 62 60
           L 62 12
           Z"
        fill="white"/>

  <!-- Cuadrante superior derecho: champagne sólido -->
  <path d="M 62 12
           L 104 12
           Q 112 12 112 20
           L 112 60
           L 62 60
           Z"
        fill="#B8956A"/>

  <!-- Cuadrante inferior izquierdo: white con opacidad -->
  <path d="M 12 60
           L 62 60
           L 62 112
           L 20 112
           Q 12 112 12 104
           Z"
        fill="white"
        fill-opacity="0.6"/>

  <!-- Cuadrante inferior derecho: champagne con opacidad -->
  <path d="M 62 60
           L 112 60
           L 112 104
           Q 112 112 104 112
           L 62 112
           Z"
        fill="#B8956A"
        fill-opacity="0.55"/>

  <!-- Líneas divisorias en navy (para separación en versión clara) -->
  <line x1="62" y1="12" x2="62" y2="112"
        stroke="#0A2540"
        stroke-width="3"/>

  <line x1="12" y1="62" x2="112" y2="62"
        stroke="#0A2540"
        stroke-width="3"/>

  <!-- ============================================
       WORDMARK: "Agile" en white
       ============================================ -->
  <text x="138" y="76"
        font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="58"
        font-weight="600"
        fill="white"
        letter-spacing="-1.5">Agile</text>

  <!-- Línea divisoria fina bajo "Agile" en white -->
  <line x1="138" y1="90" x2="326" y2="90"
        stroke="white"
        stroke-width="1.5"
        stroke-linecap="round"/>

  <!-- SUBTÍTULO en champagne -->
  <text x="138" y="116"
        font-family="'Inter', 'Helvetica Neue', 'Arial', sans-serif"
        font-size="17"
        font-weight="600"
        fill="#B8956A"
        letter-spacing="4.5">SERVICES, LLC</text>
</svg>
